workflow_id: test-chaining
name: Test Chaining Workflow
nodes:
  - id: node_a
    skill_name: builtin-smoke
    tool_name: ping
    inputs:
      x: hello
    outputs: [message, status, node]
    next: [node_b]

  - id: node_b
    skill_name: builtin-smoke
    tool_name: echo
    inputs:
      message: node_a.message
    outputs: [message, status, node]
