workflow_id: cyberpunk-fortune-comic-demo
name: Cyberpunk Fortune Comic Demo
nodes:
  - id: script_generate
    skill_name: real-comic-workflow
    tool_name: script_generate
    inputs:
      topic: "赛博朋克算命局：一个藏在霓虹暗巷里的极客，靠着废弃的算力塔和全息塔罗牌，给赛博精神病边缘的仿生人算命。"
      panels: 6
    outputs: [script_outline, panels, source_skill]
    next: [avatar_prompt_generate]

  - id: avatar_prompt_generate
    skill_name: real-comic-workflow
    tool_name: avatar_prompt_generate
    inputs:
      character_prompt: "cyberpunk fortune teller geek hiding in a neon alley, surrounded by abandoned compute towers, holographic tarot cards, oil-stained coat, augmented eyes, tired genius aura; client is an unstable near-cyberpsychosis android with cracked chrome skin, exposed neck ports, trembling hands, neon warning reflections, desperate expression"
      style: "manga"
      mode: "max"
    outputs: [avatar_prompt, style, mode, source_skill]
    next: [comic_render_prompt, knowledge_comic_plan]

  - id: comic_render_prompt
    skill_name: real-comic-workflow
    tool_name: comic_render_prompt
    inputs:
      story_prompt: script_generate.script_outline
      format: "page"
      chat_mode: "agent"
    outputs: [render_prompt, format, chat_mode, source_skill]

  - id: knowledge_comic_plan
    skill_name: real-comic-workflow
    tool_name: knowledge_comic_plan
    inputs:
      topic: "赛博朋克算命局"
      source_text: "在霓虹暗巷深处，一个极客守着废弃算力塔和全息塔罗牌，为濒临赛博精神病的仿生人占卜命运。故事核心是科技宿命、身份崩坏、人与机器的信仰缝隙。需要做成漫画，强调赛博朋克视觉、精神压迫感、神秘仪式感与命运预言。"
      art: "manga"
      tone: "dramatic"
      layout: "cinematic"
      aspect: "3:4"
      lang: "zh"
    outputs: [topic, command_preview, output_dir, source_skill]
