workflow_id: test-chaos-core
name: Test Chaos Core Workflow
nodes:
  - id: node_a
    skill_name: builtin-smoke
    tool_name: ping
    inputs:
      x: ok
    outputs: [message, status, node]
    next: [node_fail]

  - id: node_fail
    skill_name: builtin-smoke
    tool_name: fail
    inputs:
      message: node_a.message
    outputs: [message, status, node]
