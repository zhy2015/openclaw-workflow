workflow_id: ai-smoke
name: AI Smoke Workflow
nodes:
  - id: first
    skill_name: builtin-smoke
    tool_name: ping
    inputs:
      x: hello
    outputs: [pong, message]
    next: [second]

  - id: second
    skill_name: builtin-smoke
    tool_name: echo
    inputs:
      message: first.message
    outputs: [echo]
