name: "csv-data-explorer"
version: "1.0.0"
description: "Explore, filter, summarize, and visualize CSV data directly in terminal with interactive queries."

runtime: "native"

dependencies:
  system:
    - name: "python3"
      version: ">=3.8"
  python:
    - name: "pandas"
      version: ">=1.5.0"
    - name: "numpy"
      version: ">=1.21.0"
  services: []

resources:
  disk: "500MB"
  memory: "256MB"
  gpu: false

entrypoint:
  module: "scripts.csv_explorer"
  function: "explore"

inputs:
  file_path:
    type: "string"
    description: "Path to CSV file"
    required: true
  
  action:
    type: "string"
    description: "Exploration action"
    required: true
    enum: ["preview", "summary", "filter", "sort", "group", "plot"]
  
  query:
    type: "string"
    description: "Filter query (pandas syntax)"
    required: false
  
  columns:
    type: "array"
    description: "Columns to select"
    required: false
  
  limit:
    type: "integer"
    description: "Number of rows to show"
    required: false
    default: 10

outputs:
  data:
    type: "object"
    description: "Exploration results"
  
  stats:
    type: "object"
    description: "Statistical summary"
  
  plot_path:
    type: "string"
    description: "Path to generated plot"

workflow:
  name: "csv-explore-single"
  nodes:
    - id: "explore"
      name: "Explore CSV Data"
      skill: "csv-data-explorer"
      inputs:
        file_path: "$.inputs.file_path"
        action: "$.inputs.action"
        query: "$.inputs.query"
        columns: "$.inputs.columns"
        limit: "$.inputs.limit"

wal:
  enabled: true
  log_dir: "logs"
