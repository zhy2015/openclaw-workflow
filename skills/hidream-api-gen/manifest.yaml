name: "hidream-api-gen"
version: "1.0.0"
description: "OpenClaw AIGC models (video + image) client. Video generation API."

runtime: "native"

dependencies:
  system:
    - name: "python3"
      version: ">=3.8"
  python:
    - name: "requests"
      version: ">=2.28.0"
  services:
    - name: "hidream-api"
      endpoint: "https://vivago.ai"
      optional: false

resources:
  disk: "500MB"
  memory: "512MB"
  gpu: false

entrypoint:
  module: "scripts.hidream"
  function: "generate"

inputs:
  prompt:
    type: "string"
    description: "Generation prompt"
    required: true
  
  type:
    type: "string"
    description: "Content type"
    required: true
    enum: ["video", "image"]
  
  duration:
    type: "integer"
    description: "Video duration (seconds)"
    required: false
    default: 5

outputs:
  media_url:
    type: "string"
    description: "Generated media URL"
  
  download_path:
    type: "string"
    description: "Downloaded file path"

workflow:
  name: "hidream-api-gen-single"
  nodes:
    - id: "generate"
      name: "Generate Media"
      skill: "hidream-api-gen"
      inputs:
        prompt: "$.inputs.prompt"
        type: "$.inputs.type"
        duration: "$.inputs.duration"

config:
  env_required:
    - "HIDREAM_AUTHORIZATION"
