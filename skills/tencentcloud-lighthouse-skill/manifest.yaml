name: "tencentcloud-lighthouse-skill"
version: "1.0.0"
description: "Manage Tencent Cloud Lighthouse (轻量应用服务器) — auto-setup, monitoring, snapshots, remote execution."

runtime: "native"

dependencies:
  system:
    - name: "tccli"
      version: "*"
  python: []
  services:
    - name: "tencentcloud-api"
      endpoint: "https://lighthouse.tencentcloudapi.com"
      optional: false

resources:
  disk: "100MB"
  memory: "128MB"
  gpu: false

entrypoint:
  module: "scripts.lighthouse"
  function: "manage"

inputs:
  action:
    type: "string"
    description: "Lighthouse action"
    required: true
    enum: ["list", "start", "stop", "reboot", "snapshot", "exec", "monitor"]
  
  instance_id:
    type: "string"
    description: "Instance ID"
    required: false
  
  command:
    type: "string"
    description: "Command to execute (for exec)"
    required: false

outputs:
  instances:
    type: "array"
    description: "Instance list"
  
  result:
    type: "string"
    description: "Command result"

workflow:
  name: "tencentcloud-lighthouse-single"
  nodes:
    - id: "manage"
      name: "Manage Lighthouse"
      skill: "tencentcloud-lighthouse-skill"
      inputs:
        action: "$.inputs.action"
        instance_id: "$.inputs.instance_id"
        command: "$.inputs.command"

config:
  env_required:
    - "TENCENTCLOUD_SECRET_ID"
    - "TENCENTCLOUD_SECRET_KEY"
