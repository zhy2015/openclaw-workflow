# Video Production + Email Workflow
# Combines: video-production -> qqmail

name: "video-and-email"
version: "1.0.0"
description: "Generate video and send via email"

runtime: "hybrid"

dependencies:
  system:
    - name: "ffmpeg"
      version: ">=7.0"
  python: []
  services: []

resources:
  disk: "2GB"
  memory: "1GB"
  gpu: false

inputs:
  script_text:
    type: "string"
    description: "Video script text"
    required: true
  
  output_name:
    type: "string"
    description: "Output filename"
    required: false
    default: "video"
  
  email_to:
    type: "string"
    description: "Recipient email address"
    required: true
  
  email_subject:
    type: "string"
    description: "Email subject"
    required: false
    default: "Your Video is Ready"

outputs:
  video_path:
    type: "string"
    description: "Generated video path"
  
  email_sent:
    type: "boolean"
    description: "Whether email was sent"
  
  email_status:
    type: "string"
    description: "Email sending status"

# DAG Workflow
workflow:
  name: "video-and-email"
  nodes:
    - id: "generate_video"
      name: "Generate Video"
      skill: "video-production"
      runtime: "docker"
      inputs:
        script_text: "$.inputs.script_text"
        output_name: "$.inputs.output_name"
    
    - id: "send_email"
      name: "Send Email"
      skill: "qqmail"
      depends_on: ["generate_video"]
      inputs:
        action: "send"
        to: "$.inputs.email_to"
        subject: "$.inputs.email_subject"
        body: "Your video has been generated and is attached."
        attachment: "$.nodes.generate_video.outputs.video_path"

circuit_breaker:
  failure_threshold: 2
  recovery_timeout: 600

retry_policy:
  max_attempts: 2
  backoff: "linear"
  initial_delay: 10

wal:
  enabled: true
  log_dir: "/root/.openclaw/workspace/skills/workflows/logs"
  alert_channels:
    - type: "email"
      recipient: "zhy20152015@qq.com"
