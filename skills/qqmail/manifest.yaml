name: "qqmail"
version: "1.0.0"
description: "Manage QQ Mail (QQ邮箱) via IMAP/SMTP. Supports reading inbox, sending emails with attachments, searching by subject/sender/date."

runtime: "native"

dependencies:
  system:
    - name: "python3"
      version: ">=3.8"
  python: []
  services: []

resources:
  disk: "100MB"
  memory: "128MB"
  gpu: false

entrypoint:
  module: "scripts.qqmail"
  function: "main"

inputs:
  action:
    type: "string"
    description: "Action to perform: inbox, read, send, search, folders"
    required: true
    enum: ["inbox", "read", "send", "search", "folders"]
  
  to:
    type: "string"
    description: "Recipient email address (for send action)"
    required: false
  
  subject:
    type: "string"
    description: "Email subject"
    required: false
  
  body:
    type: "string"
    description: "Email body content"
    required: false
  
  attachment:
    type: "string"
    description: "Path to attachment file"
    required: false
  
  limit:
    type: "integer"
    description: "Number of emails to fetch"
    required: false
    default: 10
  
  index:
    type: "integer"
    description: "Email index to read"
    required: false

outputs:
  emails:
    type: "array"
    description: "List of emails for inbox/search actions"
  
  content:
    type: "string"
    description: "Email content for read action"
  
  status:
    type: "string"
    description: "Operation status"

workflow:
  name: "qqmail-single"
  nodes:
    - id: "execute"
      name: "Execute Mail Operation"
      skill: "qqmail"
      inputs:
        action: "$.inputs.action"
        to: "$.inputs.to"
        subject: "$.inputs.subject"
        body: "$.inputs.body"
        attachment: "$.inputs.attachment"
        limit: "$.inputs.limit"
        index: "$.inputs.index"

config:
  env_required:
    - "QQMAIL_USER"
    - "QQMAIL_AUTH_CODE"
