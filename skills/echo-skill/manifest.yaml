name: "echo-skill"
version: "1.0.0"
description: "极简冒烟测试技能：A打印Hello，B打印World"

runtime: "native"

dependencies:
  system:
    - name: "python3"
      version: ">=3.8"

entrypoint:
  module: "echo_skill"
  function: "execute"

inputs:
  message:
    type: "string"
    description: "输入消息"
    default: "Test"

outputs:
  result:
    type: "string"
    description: "执行结果"

workflow:
  name: "echo-workflow"
  nodes:
    - id: "node_a"
      name: "Node A - Hello"
      skill: "echo-skill"
      inputs:
        action: "print_hello"
      
    - id: "node_b"
      name: "Node B - World"
      skill: "echo-skill"
      depends_on: ["node_a"]
      inputs:
        action: "print_world"
        prev_output: "$.nodes.node_a.outputs.message"
