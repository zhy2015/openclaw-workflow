name: "notion"
version: "1.0.0"
description: "Notion API for creating and managing pages, databases, and blocks."

runtime: "native"

dependencies:
  system:
    - name: "python3"
      version: ">=3.8"
  python:
    - name: "requests"
      version: ">=2.28.0"
  services:
    - name: "notion-api"
      endpoint: "https://api.notion.com/v1"
      optional: false

resources:
  disk: "50MB"
  memory: "128MB"
  gpu: false

entrypoint:
  module: "scripts.notion_api"
  function: "execute"

inputs:
  action:
    type: "string"
    description: "Action to perform"
    required: true
    enum: ["create_page", "update_page", "query_database", "create_database", "append_blocks"]
  
  parent_id:
    type: "string"
    description: "Parent page/database ID"
    required: false
  
  title:
    type: "string"
    description: "Page title"
    required: false
  
  content:
    type: "string"
    description: "Page content"
    required: false
  
  properties:
    type: "object"
    description: "Page/database properties"
    required: false

outputs:
  page_id:
    type: "string"
    description: "Created/updated page ID"
  
  url:
    type: "string"
    description: "Notion page URL"
  
  results:
    type: "array"
    description: "Query results"

workflow:
  name: "notion-single"
  nodes:
    - id: "execute"
      name: "Execute Notion API"
      skill: "notion"
      inputs:
        action: "$.inputs.action"
        parent_id: "$.inputs.parent_id"
        title: "$.inputs.title"
        content: "$.inputs.content"
        properties: "$.inputs.properties"

config:
  env_required:
    - "NOTION_TOKEN"
