# 防御型视频生成 DAG 模板
# 基于 Phoenix 混沌测试经验生成
# 特性: 重试、降级、熔断、超时

name: "video-production-resilient"
version: "1.0.0-defensive"
description: "带防御机制的视频生成工作流，自动处理 API 限流、GPU OOM、网络超时"

# 全局默认值
defaults:
  retry_policy:
    max_attempts: 3
    backoff: "exponential"
    initial_delay: 5
    max_delay: 60
  
  timeout:
    video_generation: 300  # 5分钟
    audio_synthesis: 120   # 2分钟
    video_merge: 600       # 10分钟
  
  circuit_breaker:
    failure_threshold: 3
    recovery_timeout: 300

# DAG 节点
nodes:
  # ========== 场景 1 ==========
  - id: "scene_1_gen"
    name: "Scene 1 视频生成"
    skill: "hidream-api-gen"
    timeout: 300
    retry:
      max_attempts: 3
      on_error: ["API_TIMEOUT", "RATE_LIMIT", "GPU_OOM"]
    fallback:
      strategy: "static_video"  # 使用占位视频
      params:
        duration: 5
        text: "Scene 1 Placeholder"
    inputs:
      prompt: "$.inputs.script_text.scene_1.visual"
      duration: 5
    
  - id: "scene_1_audio"
    name: "Scene 1 音频生成"
    skill: "edge-tts"
    depends_on: ["scene_1_gen"]
    timeout: 120
    retry:
      max_attempts: 2
    fallback:
      strategy: "silent_audio"
      params:
        duration: "$.nodes.scene_1_gen.outputs.duration"
    inputs:
      text: "$.inputs.script_text.scene_1.audio"
      rate: "-10%"
    
  # ========== 场景 2 (依赖场景1尾帧) ==========
  - id: "scene_2_gen"
    name: "Scene 2 视频生成"
    skill: "hidream-api-gen"
    depends_on: ["scene_1_gen"]
    timeout: 300
    retry:
      max_attempts: 3
      on_error: ["API_TIMEOUT", "RATE_LIMIT", "GPU_OOM"]
    fallback:
      strategy: "static_video"
    inputs:
      prompt: "$.inputs.script_text.scene_2.visual"
      duration: 6
      last_frame: "$.nodes.scene_1_gen.outputs.last_frame"
    
  - id: "scene_2_audio"
    name: "Scene 2 音频生成"
    skill: "edge-tts"
    depends_on: ["scene_2_gen"]
    timeout: 120
    retry:
      max_attempts: 2
    fallback:
      strategy: "silent_audio"
    inputs:
      text: "$.inputs.script_text.scene_2.audio"
      rate: "-10%"
    
  # ========== 场景 3 ==========
  - id: "scene_3_gen"
    name: "Scene 3 视频生成"
    skill: "hidream-api-gen"
    depends_on: ["scene_2_gen"]
    timeout: 300
    retry:
      max_attempts: 3
      on_error: ["API_TIMEOUT", "RATE_LIMIT", "GPU_OOM"]
    fallback:
      strategy: "static_video"
    inputs:
      prompt: "$.inputs.script_text.scene_3.visual"
      duration: 5
      force_fresh_anchor: true
    
  - id: "scene_3_audio"
    name: "Scene 3 音频生成"
    skill: "edge-tts"
    depends_on: ["scene_3_gen"]
    timeout: 120
    retry:
      max_attempts: 2
    fallback:
      strategy: "silent_audio"
    inputs:
      text: "$.inputs.script_text.scene_3.audio"
      rate: "-10%"
    
  # ========== 字幕生成 (并行) ==========
  - id: "generate_subtitles"
    name: "字幕生成"
    skill: "video-production-chaos"
    parallel: true
    depends_on: ["scene_1_gen", "scene_2_gen", "scene_3_gen"]
    timeout: 180
    retry:
      max_attempts: 2
      on_error: ["GPU_OOM"]
    fallback:
      strategy: "skip"  # 可选功能，失败可跳过
    inputs:
      action: "generate_subtitles"
      video_segments:
        - "$.nodes.scene_1_gen.outputs.video_path"
        - "$.nodes.scene_2_gen.outputs.video_path"
        - "$.nodes.scene_3_gen.outputs.video_path"
    
  # ========== 最终合并 ==========
  - id: "video_merge"
    name: "视频合并"
    skill: "video-production"
    runtime: "docker"
    depends_on: 
      - "scene_1_audio"
      - "scene_2_audio"
      - "scene_3_audio"
      - "generate_subtitles"
    timeout: 600
    retry:
      max_attempts: 2
      on_error: ["FFMPEG_ERROR", "DISK_FULL"]
    fallback:
      strategy: "concat_only"  # 降级为简单拼接
    inputs:
      scenes:
        - video: "$.nodes.scene_1_gen.outputs.video_path"
          audio: "$.nodes.scene_1_audio.outputs.audio_path"
        - video: "$.nodes.scene_2_gen.outputs.video_path"
          audio: "$.nodes.scene_2_audio.outputs.audio_path"
        - video: "$.nodes.scene_3_gen.outputs.video_path"
          audio: "$.nodes.scene_3_audio.outputs.audio_path"
      subtitles: "$.nodes.generate_subtitles.outputs.subtitle_path"
      output_name: "$.inputs.output_name"

# 输出定义
outputs:
  video_path:
    type: "string"
    description: "最终视频路径"
    from: "$.nodes.video_merge.outputs.video_path"
  
  fallback_used:
    type: "boolean"
    description: "是否使用了降级策略"
    from: "$.execution.fallback_triggered"
  
  failed_nodes:
    type: "array"
    description: "失败的节点列表"
    from: "$.execution.failed_nodes"

# 告警配置
alerts:
  on_failure:
    - type: "email"
      recipient: "zhy20152015@qq.com"
      template: "video_production_failed"
    
  on_fallback:
    - type: "log"
      level: "warning"
      message: "Fallback strategy activated for node {node_id}"
    
  on_retry:
    - type: "log"
      level: "info"
      message: "Retrying node {node_id}, attempt {attempt}/{max_attempts}"
