<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>决策推演沙盘 · 心理锚点</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #e8e8e8;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, rgba(46,204,113,0.3), transparent);
            background-size: 450px 250px;
            animation: twinkle 6s ease-in-out infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
        
        header { text-align: center; margin-bottom: 40px; padding: 20px 0; border-bottom: 1px solid rgba(46,204,113, 0.3); }
        .back-link { color: #888; text-decoration: none; font-size: 0.9rem; position: absolute; left: 20px; top: 30px; }
        .back-link:hover { color: #2ecc71; }
        .logo-small { width: 50px; height: 50px; border-radius: 10px; margin-bottom: 10px; }
        header h1 { font-size: 1.8rem; color: #2ecc71; letter-spacing: 3px; }
        .subtitle { color: #888; font-size: 0.9rem; margin-top: 5px; }
        
        .intro-box {
            background: linear-gradient(145deg, rgba(46,204,113,0.1) 0%, rgba(39,174,96,0.05) 100%);
            border: 1px solid rgba(46,204,113, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .intro-text { color: #aaa; font-size: 0.9rem; line-height: 1.8; }
        
        .card {
            background: linear-gradient(145deg, rgba(30,30,50,0.6) 0%, rgba(20,20,40,0.4) 100%);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(46,204,113, 0.2);
        }
        .card-title { color: #2ecc71; font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 2px; }
        
        input, textarea { width: 100%; padding: 14px 18px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(46,204,113, 0.2); border-radius: 8px; color: #f0f0f0; font-size: 1rem; font-family: inherit; }
        textarea { min-height: 100px; resize: vertical; margin-bottom: 15px; }
        
        /* 卦象展示 */
        .hexagram-display {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 25px 0;
        }
        .hexagram-card {
            background: linear-gradient(145deg, rgba(46,204,113,0.1) 0%, rgba(39,174,96,0.05) 100%);
            border: 2px solid rgba(46,204,113, 0.3);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }
        .hexagram-card.revealed {
            border-color: #2ecc71;
            background: linear-gradient(145deg, rgba(46,204,113,0.2) 0%, rgba(39,174,96,0.1) 100%);
            box-shadow: 0 0 30px rgba(46,204,113, 0.15);
        }
        .hexagram-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .hexagram-name {
            font-size: 1.4rem;
            color: #2ecc71;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .hexagram-symbol {
            font-size: 2rem;
            margin: 10px 0;
        }
        .hexagram-element {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 5px;
        }
        
        .cast-btn {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border: none; border-radius: 8px;
            color: #fff; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; letter-spacing: 4px;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        .cast-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(46,204,113, 0.4); }
        .cast-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .analyze-btn {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            border: none; border-radius: 8px;
            color: #fff; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; letter-spacing: 4px;
            transition: all 0.3s;
        }
        .analyze-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(39,174,96, 0.4); }
        .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,26,0.98); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .loading-overlay.show { display: flex; }
        .spinner { width: 60px; height: 60px; border: 3px solid rgba(46,204,113, 0.2); border-top-color: #2ecc71; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .result-card { display: none; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(46,204,113, 0.3); }
        .result-card.show { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .result-title { font-size: 1.4rem; color: #2ecc71; text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(46,204,113, 0.3); }
        .insight-block { background: rgba(46,204,113, 0.05); border-left: 3px solid #2ecc71; padding: 15px 20px; margin: 15px 0; border-radius: 0 8px 8px 0; }
        .insight-title { color: #2ecc71; font-weight: 600; margin-bottom: 8px; }
        .insight-content { color: #ccc; line-height: 1.8; }
        
        .timing-box {
            text-align: center;
            padding: 25px;
            border-radius: 12px;
            margin: 20px 0;
        }
        .timing-box.wait { background: linear-gradient(135deg, rgba(231,76,60,0.1) 0%, rgba(192,57,43,0.1) 100%); border: 1px solid rgba(231,76,60,0.3); }
        .timing-box.act { background: linear-gradient(135deg, rgba(46,204,113,0.1) 0%, rgba(39,174,96,0.1) 100%); border: 1px solid rgba(46,204,113,0.3); }
        .timing-icon { font-size: 2rem; margin-bottom: 10px; }
        .timing-text { font-size: 1.3rem; font-weight: 600; }
        .timing-box.wait .timing-text { color: #e74c3c; }
        .timing-box.act .timing-text { color: #2ecc71; }
        
        @media (max-width: 768px) { .hexagram-display { grid-template-columns: 1fr; } header h1 { font-size: 1.4rem; } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p style="color: #2ecc71;">正在推演局势...</p>
        <p style="color: #888; font-size: 0.9rem; margin-top: 10px;">这需要 30-60 秒</p>
    </div>

    <div class="container">
        <header>
            <a href="/" class="back-link">← 返回首页</a>
            <img src="/logo.png" alt="心理锚点" class="logo-small">
            <h1>♟️ 决策推演沙盘</h1>
            <p class="subtitle">梳理局势的阻力点与最佳行动时机</p>
        </header>
        
        <div class="intro-box">
            <p class="intro-text">
                在心中默念你想决策的事项，保持内心平静。<br>
                然后点击「起卦」，让系统为你推演当前局势。
            </p>
        </div>
        
        <div class="card" id="inputCard">
            <div class="card-title">你想决策的事项（可选）</div>
            <textarea id="question" placeholder="例如：我该不该接受这个海外工作机会？要不要现在创业？"></textarea>
            
            <div class="card-title" style="margin-top: 25px;">卦象推演结果</div>
            <div class="hexagram-display" id="hexagramDisplay">
                <div class="hexagram-card" id="mainHex">
                    <div class="hexagram-label">本卦 · 当前态势</div>
                    <div class="hexagram-symbol">☯</div>
                    <div class="hexagram-name">点击起卦</div>
                    <div class="hexagram-element"></div>
                </div>
                <div class="hexagram-card" id="mutualHex">
                    <div class="hexagram-label">互卦 · 隐藏因素</div>
                    <div class="hexagram-symbol">☯</div>
                    <div class="hexagram-name">点击起卦</div>
                    <div class="hexagram-element"></div>
                </div>
                <div class="hexagram-card" id="changedHex">
                    <div class="hexagram-label">变卦 · 发展趋势</div>
                    <div class="hexagram-symbol">☯</div>
                    <div class="hexagram-name">点击起卦</div>
                    <div class="hexagram-element"></div>
                </div>
            </div>
            
            <button class="cast-btn" id="castBtn" onclick="castHexagram()">☯ 一键起卦推演</button>
            <button class="analyze-btn" id="analyzeBtn" onclick="analyzeDecision()" disabled>🔮 开始局势分析</button>
        </div>
        
        <div class="card result-card" id="resultCard">
            <div class="result-title" id="resultTitle"></div>
            <div id="resultContent"></div>
        </div>
    </div>
    
    <script>

            { name: "地雷复", symbol: "☷☳", element: "土", trigram: [0,0,0,0,0,1] },
            { name: "天雷无妄", symbol: "☰☳", element: "金", trigram: [1,1,1,0,0,1] },
            { name: "山天大畜", symbol: "☶☰", element: "土", trigram: [1,0,0,1,1,1] },
            { name: "山雷颐", symbol: "☶☳", element: "土", trigram: [1,0,0,0,0,1] },
            { name: "泽风大过", symbol: "☱☴", element: "金", trigram: [0,1,1,0,1,1] },
            { name: "坎为水", symbol: "☵☵", element: "水", trigram: [0,1,0,0,1,0] },
            { name: "离为火", symbol: "☲☲", element: "火", trigram: [1,0,1,1,0,1] },
            { name: "泽山咸", symbol: "☱☶", element: "金", trigram: [0,1,1,1,0,0] },
            { name: "雷风恒", symbol: "☳☴", element: "木", trigram: [0,0,1,0,1,1] },
            { name: "天山遁", symbol: "☰☶", element: "金", trigram: [1,1,1,1,0,0] },

            { name: "地火明夷", symbol: "☷☲", element: "土", trigram: [0,0,0,1,0,1] },
            { name: "风火家人", symbol: "☴☲", element: "木", trigram: [0,1,1,1,0,1] },
            { name: "火泽睽", symbol: "☲☱", element: "火", trigram: [1,0,1,0,1,1] },

            { name: "雷水解", symbol: "☳☵", element: "木", trigram: [0,0,1,0,1,0] },

            { name: "风雷益", symbol: "☴☳", element: "木", trigram: [0,1,1,0,0,1] },
            { name: "泽天夬", symbol: "☱☰", element: "金", trigram: [0,1,1,1,1,1] },
            { name: "天风姤", symbol: "☰☴", element: "金", trigram: [1,1,1,0,1,1] },
            { name: "泽地萃", symbol: "☱☷", element: "金", trigram: [0,1,1,0,0,0] },
            { name: "地风升", symbol: "☷☴", element: "土", trigram: [0,0,0,0,1,1] },
            { name: "泽水困", symbol: "☱☵", element: "金", trigram: [0,1,1,0,1,0] },
            { name: "水风井", symbol: "☵☴", element: "水", trigram: [0,1,0,0,1,1] },
            { name: "泽火革", symbol: "☱☲", element: "金", trigram: [0,1,1,1,0,1] },
            { name: "火风鼎", symbol: "☲☴", element: "火", trigram: [1,0,1,0,1,1] },
            { name: "震为雷", symbol: "☳☳", element: "木", trigram: [0,0,1,0,0,1] },
            { name: "艮为山", symbol: "☶☶", element: "土", trigram: [1,0,0,1,0,0] },
            { name: "风山渐", symbol: "☴☶", element: "木", trigram: [0,1,1,1,0,0] },
            { name: "雷泽归妹", symbol: "☳☱", element: "木", trigram: [0,0,1,0,1,1] },
            { name: "雷火丰", symbol: "☳☲", element: "木", trigram: [0,0,1,1,0,1] },
            { name: "火山旅", symbol: "☲☶", element: "火", trigram: [1,0,1,1,0,0] },
            { name: "巽为风", symbol: "☴☴", element: "木", trigram: [0,1,1,0,1,1] },
            { name: "兑为泽", symbol: "☱☱", element: "金", trigram: [0,1,1,0,1,1] },
            { name: "风水涣", symbol: "☴☵", element: "木", trigram: [0,1,1,0,1,0] },
            { name: "水泽节", symbol: "☵☱", element: "水", trigram: [0,1,0,0,1,1] },
            { name: "风泽中孚", symbol: "☴☱", element: "木", trigram: [0,1,1,0,1,1] },
            { name: "雷山小过", symbol: "☳☶", element: "木", trigram: [0,0,1,1,0,0] },
            { name: "水火既济", symbol: "☵☲", element: "水", trigram: [0,1,0,1,0,1] },
            { name: "火水未济", symbol: "☲☵", element: "火", trigram: [1,0,1,0,1,0] }
        ];
        
        let currentHexagrams = {};
        
        function castHexagram() {
            // 随机抽取本卦
            const mainIndex = Math.floor(Math.random() * hexagrams.length);
            const mainHex = hexagrams[mainIndex];
            
            // 随机确定动爻位置 (1-6)
            const changingLine = Math.floor(Math.random() * 6) + 1;
            
            // 计算变卦
            const changedTrigram = [...mainHex.trigram];
            changedTrigram[changingLine - 1] = 1 - changedTrigram[changingLine - 1];
            
            const changedHex = hexagrams.find(h => 
                h.trigram.every((v, i) => v === changedTrigram[i])
            ) || hexagrams[0];
            
            // 计算互卦 (取234爻为下互卦，345爻为上互卦)
            const mutualLower = [mainHex.trigram[1], mainHex.trigram[2], mainHex.trigram[3]];
            const mutualUpper = [mainHex.trigram[2], mainHex.trigram[3], mainHex.trigram[4]];
            const mutualTrigram = [...mutualLower, ...mutualUpper];
            
            const mutualHex = hexagrams.find(h => 
                h.trigram.every((v, i) => v === mutualTrigram[i])
            ) || hexagrams[0];
            
            currentHexagrams = {
                main: mainHex,
                mutual: mutualHex,
                changed: changedHex,
                changingLine: changingLine,
                bodyElement: mainHex.element,
                useElement: mutualHex.element
            };
            
            // 动画效果
            const cardElements = ['mainHex', 'mutualHex', 'changedHex'];
            cardElements.forEach(id => {
                document.getElementById(id).classList.remove('revealed');
                document.getElementById(id).querySelector('.hexagram-name').textContent = '推演中...';
            });
            
            setTimeout(() => {
                updateHexagramCard('mainHex', mainHex, '本卦');
                updateHexagramCard('mutualHex', mutualHex, '互卦');
                updateHexagramCard('changedHex', changedHex, '变卦');
                
                document.getElementById('analyzeBtn').disabled = false;
            }, 800);
        }
        
        function updateHexagramCard(elementId, hexData, label) {
            const el = document.getElementById(elementId);
            el.classList.add('revealed');
            el.querySelector('.hexagram-label').textContent = label;
            el.querySelector('.hexagram-symbol').textContent = hexData.symbol;
            el.querySelector('.hexagram-name').textContent = hexData.name;
            el.querySelector('.hexagram-element').textContent = '五行：' + hexData.element;
        }
        
        const API_BASE = 'http://124.222.70.196:30001';
        
        async function analyzeDecision() {
            if (!currentHexagrams.main) return alert('请先起卦');
            
            const question = document.getElementById('question').value.trim() || '我想了解当前面临的决策';
            
            document.getElementById('loadingOverlay').classList.add('show');
            document.getElementById('resultCard').classList.remove('show');
            
            try {
                const response = await fetch(`${API_BASE}/api/plum-blossom`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        hexagrams: {
                            main: currentHexagrams.main.name,
                            mutual: currentHexagrams.mutual.name,
                            changed: currentHexagrams.changed.name
                        },
                        changing_lines: [currentHexagrams.changingLine],
                        body_element: currentHexagrams.bodyElement,
                        use_element: currentHexagrams.useElement
                    })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || '推演失败');
                
                displayResult(data.result);
                
            } catch (error) {
                alert('推演失败：' + error.message);
            } finally {
                document.getElementById('loadingOverlay').classList.remove('show');
            }
        }
        
        function displayResult(result) {
            document.getElementById('resultTitle').textContent = result.title;
            
            let html = '';
            
            if (result.situation_translation) {
                html += `<div class="insight-block"><div class="insight-title">🎯 局势翻译</div><div class="insight-content">${result.situation_translation}</div></div>`;
            }
            
            if (result.timing_assessment) {
                const isWait = result.timing_assessment.wait_or_act === 'wait';
                html += `<div class="timing-box ${isWait ? 'wait' : 'act'}"><div class="timing-icon">${isWait ? '⏸️' : '▶️'}</div><div class="timing-text">${isWait ? '建议等待' : '可以行动'}</div><div style="color: #aaa; margin-top: 10px;">${result.timing_assessment.reason}</div></div>`;
            }
            
            if (result.actionable_advice && result.actionable_advice.length > 0) {
                html += `<div class="card-title" style="margin-top: 25px;">💡 战略建议</div>`;
                result.actionable_advice.forEach(advice => {
                    html += `<div class="insight-block"><div class="insight-content">${advice}</div></div>`;
                });
            }
            
            document.getElementById('resultContent').innerHTML = html;
            document.getElementById('resultCard').classList.add('show');
