<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潜意识投射 · 心理锚点</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #e8e8e8;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, rgba(100,149,237,0.3), transparent);
            background-size: 450px 250px;
            animation: twinkle 6s ease-in-out infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
        
        header { text-align: center; margin-bottom: 40px; padding: 20px 0; border-bottom: 1px solid rgba(100,149,237, 0.3); }
        .back-link { color: #888; text-decoration: none; font-size: 0.9rem; position: absolute; left: 20px; top: 30px; }
        .back-link:hover { color: #6495ed; }
        .logo-small { width: 50px; height: 50px; border-radius: 10px; margin-bottom: 10px; }
        header h1 { font-size: 1.8rem; color: #6495ed; letter-spacing: 3px; }
        .subtitle { color: #888; font-size: 0.9rem; margin-top: 5px; }
        
        .intro-box {
            background: linear-gradient(145deg, rgba(100,149,237,0.1) 0%, rgba(147,112,219,0.05) 100%);
            border: 1px solid rgba(100,149,237, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .intro-text { color: #aaa; font-size: 0.9rem; line-height: 1.8; }
        
        .card {
            background: linear-gradient(145deg, rgba(30,30,50,0.6) 0%, rgba(20,20,40,0.4) 100%);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(100,149,237, 0.2);
        }
        .card-title { color: #6495ed; font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 2px; }
        
        input, textarea { width: 100%; padding: 14px 18px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(100,149,237, 0.2); border-radius: 8px; color: #f0f0f0; font-size: 1rem; font-family: inherit; }
        textarea { min-height: 100px; resize: vertical; margin-bottom: 15px; }
        
        /* 塔罗牌展示区域 */
        .cards-display {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 25px 0;
        }
        .tarot-card {
            background: linear-gradient(145deg, rgba(100,149,237,0.15) 0%, rgba(147,112,219,0.1) 100%);
            border: 2px solid rgba(100,149,237, 0.3);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .tarot-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, #6495ed, transparent);
        }
        .tarot-card.revealed {
            border-color: #9370db;
            background: linear-gradient(145deg, rgba(147,112,219,0.2) 0%, rgba(100,149,237,0.15) 100%);
        }
        .tarot-card.reversed { border-color: #e74c3c; }
        .tarot-card.reversed .card-name { color: #e74c3c; }
        .card-number {
            position: absolute;
            top: 10px; right: 12px;
            width: 26px; height: 26px;
            background: rgba(100,149,237, 0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; color: #fff;
        }
        .card-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .card-name { color: #6495ed; font-size: 1rem; font-weight: 600; margin-bottom: 5px; }
        .card-position { color: #888; font-size: 0.8rem; }
        .card-position.reversed { color: #e74c3c; }
        
        .draw-btn {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #6495ed 0%, #9370db 100%);
            border: none; border-radius: 8px;
            color: #fff; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; letter-spacing: 4px;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        .draw-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(100,149,237, 0.4); }
        .draw-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .analyze-btn {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #9370db 0%, #6495ed 100%);
            border: none; border-radius: 8px;
            color: #fff; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; letter-spacing: 4px;
            transition: all 0.3s;
        }
        .analyze-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(147,112,219, 0.4); }
        .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,26,0.98); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .loading-overlay.show { display: flex; }
        .spinner { width: 60px; height: 60px; border: 3px solid rgba(100,149,237, 0.2); border-top-color: #6495ed; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .result-card { display: none; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(100,149,237, 0.3); }
        .result-card.show { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .result-title { font-size: 1.4rem; color: #6495ed; text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(100,149,237, 0.3); }
        .insight-block { background: rgba(100,149,237, 0.05); border-left: 3px solid #6495ed; padding: 15px 20px; margin: 15px 0; border-radius: 0 8px 8px 0; }
        .insight-title { color: #6495ed; font-weight: 600; margin-bottom: 8px; }
        .insight-content { color: #ccc; line-height: 1.8; white-space: pre-wrap; }
        
        @media (max-width: 768px) { .cards-display { grid-template-columns: 1fr; } header h1 { font-size: 1.4rem; } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p style="color: #6495ed;">正在解读你的潜意识投射...</p>
        <p style="color: #888; font-size: 0.9rem; margin-top: 10px;">这需要 30-60 秒</p>
    </div>

    <div class="container">
        <header>
            <a href="/" class="back-link">← 返回首页</a>
            <img src="/logo.png" alt="心理锚点" class="logo-small">
            <h1>🪞 潜意识投射</h1>
            <p class="subtitle">借助荣格心理学原型意象，照见被压抑的真实诉求</p>
        </header>
        
        <div class="intro-box">
            <p class="intro-text">
                闭上眼睛，深呼吸三次，在心中默念你想探索的问题。<br>
                然后点击「抽牌」，让潜意识为你选出三张指引之牌。
            </p>
        </div>
        
        <div class="card" id="inputCard">
            <div class="card-title">写下你的问题（可选）</div>
            <textarea id="question" placeholder="例如：我最近面临一个重要的职业选择，内心很纠结..."></textarea>
            
            <div class="card-title" style="margin-top: 25px;">你的三张指引牌</div>
            <div class="cards-display" id="cardsDisplay">
                <div class="tarot-card" id="card1">
                    <div class="card-number">1</div>
                    <div class="card-icon">🎴</div>
                    <div class="card-name">点击抽牌</div>
                    <div class="card-position">过去/根源</div>
                </div>
                <div class="tarot-card" id="card2">
                    <div class="card-number">2</div>
                    <div class="card-icon">🎴</div>
                    <div class="card-name">点击抽牌</div>
                    <div class="card-position">现在/课题</div>
                </div>
                <div class="tarot-card" id="card3">
                    <div class="card-number">3</div>
                    <div class="card-icon">🎴</div>
                    <div class="card-name">点击抽牌</div>
                    <div class="card-position">未来/方向</div>
                </div>
            </div>
            
            <button class="draw-btn" id="drawBtn" onclick="drawCards()">🔮 一键抽取三张牌</button>
            <button class="analyze-btn" id="analyzeBtn" onclick="analyzeProjection()" disabled>✨ 开始潜意识解读</button>
        </div>
        
        <div class="card result-card" id="resultCard">
            <div class="result-title" id="resultTitle"></div>
            <div id="resultContent"></div>
        </div>
    </div>
    
    <script>
        // 78张塔罗牌
        const tarotCards = [
            // 大阿尔卡纳 (22张)
            { name: "愚者", icon: "🃏" }, { name: "魔术师", icon: "🎩" }, { name: "女祭司", icon: "🌙" },
            { name: "皇后", icon: "👑" }, { name: "皇帝", icon: "⚔️" }, { name: "教皇", icon: "📿" },
            { name: "恋人", icon: "💕" }, { name: "战车", icon: "🏛️" }, { name: "力量", icon: "🦁" },
            { name: "隐者", icon: "🏔️" }, { name: "命运之轮", icon: "☸️" }, { name: "正义", icon: "⚖️" },
            { name: "倒吊人", icon: "🙃" }, { name: "死神", icon: "💀" }, { name: "节制", icon: "🏺" },
            { name: "恶魔", icon: "😈" }, { name: "塔", icon: "🗼" }, { name: "星星", icon: "⭐" },
            { name: "月亮", icon: "🌙" }, { name: "太阳", icon: "☀️" }, { name: "审判", icon: "📯" },
            { name: "世界", icon: "🌍" },
            // 小阿尔卡纳 - 权杖 (14张)
            { name: "权杖首牌", icon: "🔥" }, { name: "权杖二", icon: "⚔️" }, { name: "权杖三", icon: "🚢" },
            { name: "权杖四", icon: "🏰" }, { name: "权杖五", icon: "⚔️" }, { name: "权杖六", icon: "🏆" },
            { name: "权杖七", icon: "🛡️" }, { name: "权杖八", icon: "⚡" }, { name: "权杖九", icon: "👁️" },
            { name: "权杖十", icon: "🏋️" }, { name: "权杖侍从", icon: "📜" }, { name: "权杖骑士", icon: "🏇" },
            { name: "权杖皇后", icon: "👸" }, { name: "权杖国王", icon: "🤴" },
            // 小阿尔卡纳 - 圣杯 (14张)
            { name: "圣杯首牌", icon: "🏆" }, { name: "圣杯二", icon: "💑" }, { name: "圣杯三", icon: "🎉" },
            { name: "圣杯四", icon: "😔" }, { name: "圣杯五", icon: "😢" }, { name: "圣杯六", icon: "🌸" },
            { name: "圣杯七", icon: "🌈" }, { name: "圣杯八", icon: "🚶" }, { name: "圣杯九", icon: "😊" },
            { name: "圣杯十", icon: "👨‍👩‍👧‍👦" }, { name: "圣杯侍从", icon: "🐟" }, { name: "圣杯骑士", icon: "🦄" },
            { name: "圣杯皇后", icon: "👑" }, { name: "圣杯国王", icon: "🧜‍♂️" },
            // 小阿尔卡纳 - 宝剑 (14张)
            { name: "宝剑首牌", icon: "⚔️" }, { name: "宝剑二", icon: "🙈" }, { name: "宝剑三", icon: "💔" },
            { name: "宝剑四", icon: "🛌" }, { name: "宝剑五", icon: "🏴‍☠️" }, { name: "宝剑六", icon: "🚣" },
            { name: "宝剑七", icon: "🗡️" }, { name: "宝剑八", icon: "🔗" }, { name: "宝剑九", icon: "😰" },
            { name: "宝剑十", icon: "☠️" }, { name: "宝剑侍从", icon: "📨" }, { name: "宝剑骑士", icon: "⚡" },
            { name: "宝剑皇后", icon: "👁️" }, { name: "宝剑国王", icon: "🧠" },
            // 小阿尔卡纳 - 星币 (14张)
            { name: "星币首牌", icon: "💰" }, { name: "星币二", icon: "🤹" }, { name: "星币三", icon: "🏗️" },
            { name: "星币四", icon: "🐉" }, { name: "星币五", icon: "❄️" }, { name: "星币六", icon: "🤲" },
            { name: "星币七", icon: "🌾" }, { name: "星币八", icon: "🔨" }, { name: "星币九", icon: "🦚" },
            { name: "星币十", icon: "🏛️" }, { name: "星币侍从", icon: "📚" }, { name: "星币骑士", icon: "🐢" },
            { name: "星币皇后", icon: "🌳" }, { name: "星币国王", icon: "👔" }
        ];
        
        let drawnCards = [];
        
        function drawCards() {
            drawnCards = [];
            
            // 随机抽取3张牌
            for (let i = 0; i < 3; i++) {
                const cardIndex = Math.floor(Math.random() * tarotCards.length);
                const isReversed = Math.random() < 0.3; // 30%概率逆位
                drawnCards.push({
                    ...tarotCards[cardIndex],
                    position: isReversed ? '逆位' : '正位',
                    positionLabel: ['过去/根源', '现在/课题', '未来/方向'][i]
                });
            }
            
            // 动画效果
            const cardElements = [document.getElementById('card1'), document.getElementById('card2'), document.getElementById('card3')];
            
            cardElements.forEach((el, i) => {
                el.classList.remove('revealed', 'reversed');
                el.style.opacity = '0.5';
                el.querySelector('.card-name').textContent = '洗牌中...';
            });
            
            setTimeout(() => {
                cardElements.forEach((el, i) => {
                    const card = drawnCards[i];
                    el.style.opacity = '1';
                    el.classList.add('revealed');
                    if (card.position === '逆位') el.classList.add('reversed');
                    
                    el.querySelector('.card-icon').textContent = card.icon;
                    el.querySelector('.card-name').textContent = card.name + card.position;
                    el.querySelector('.card-position').textContent = card.positionLabel + ' · ' + card.position;
                    el.querySelector('.card-position').className = 'card-position' + (card.position === '逆位' ? ' reversed' : '');
                });
                
                document.getElementById('analyzeBtn').disabled = false;
            }, 800);
        }
        
        const API_BASE = 'http://124.222.70.196:30001';
        
        async function analyzeProjection() {
            if (drawnCards.length !== 3) return alert('请先抽取塔罗牌');
            
            const question = document.getElementById('question').value.trim() || '我想了解当前内心的真实状态';
            
            document.getElementById('loadingOverlay').classList.add('show');
            document.getElementById('resultCard').classList.remove('show');
            
            try {
                const response = await fetch(`${API_BASE}/api/tarot`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        cards: drawnCards.map(c => c.name + c.position),
                        spread_type: 'past_present_future'
                    })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || '解读失败');
                
                displayResult(data.result);
                
            } catch (error) {
                alert('解读失败：' + error.message);
            } finally {
                document.getElementById('loadingOverlay').classList.remove('show');
            }
        }
        
        function displayResult(result) {
            document.getElementById('resultTitle').textContent = result.title;
            
            let html = '';
            
            if (result.narrative) {
                html += `<div class="insight-block"><div class="insight-title">📖 潜意识叙事</div><div class="insight-content">${result.narrative}</div></div>`;
            }
            
            if (result.card_insights && result.card_insights.length > 0) {
                html += `<div class="card-title" style="margin-top: 25px;">🔮 单牌解读</div>`;
                result.card_insights.forEach(insight => {
                    html += `<div class="insight-block"><div class="insight-title">${insight.card}</div><div class="insight-content"><strong>心理投射：</strong>${insight.projection}<br><br><strong>阴影面：</strong>${insight.shadow}</div></div>`;
                });
            }
            
            if (result.core_conflict) {
                html += `<div class="insight-block" style="border-left-color: #e74c3c;"><div class="insight-title">⚡ 核心冲突</div><div class="insight-content">${result.core_conflict}</div></div>`;
            }
            
            if (result.actionable_advice && result.actionable_advice.length > 0) {
                html += `<div class="card-title" style="margin-top: 25px;">💡 破局建议</div>`;
                result.actionable_advice.forEach(advice => {
                    html += `<div class="insight-block" style="border-left-color: #2ecc71;"><div class="insight-content">✦ ${advice}</div></div>`;
                });
            }
            
            document.getElementById('resultContent').innerHTML = html;
            document.getElementById('resultCard').classList.add('show');
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
