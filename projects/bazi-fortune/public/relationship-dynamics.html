<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亲密关系动力学 · 心灵锚点</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #e8e8e8;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, rgba(233,30,99,0.3), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(233,30,99,0.2), transparent);
            background-size: 450px 250px;
            animation: twinkle 6s ease-in-out infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
        
        header { text-align: center; margin-bottom: 40px; padding: 20px 0; border-bottom: 1px solid rgba(233,30,99, 0.3); }
        .back-link { color: #888; text-decoration: none; font-size: 0.9rem; position: absolute; left: 20px; top: 30px; }
        .back-link:hover { color: #e91e63; }
        .logo-small { width: 50px; height: 50px; border-radius: 10px; margin-bottom: 10px; }
        header h1 { font-size: 1.8rem; color: #e91e63; letter-spacing: 3px; }
        .subtitle { color: #888; font-size: 0.9rem; margin-top: 5px; }
        
        .intro-box {
            background: linear-gradient(145deg, rgba(233,30,99,0.1) 0%, rgba(233,30,99,0.05) 100%);
            border: 1px solid rgba(233,30,99, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .intro-text { color: #aaa; font-size: 0.9rem; line-height: 1.8; }
        
        .card {
            background: linear-gradient(145deg, rgba(30,30,50,0.6) 0%, rgba(20,20,40,0.4) 100%);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(233,30,99, 0.2);
        }
        .card-title { color: #e91e63; font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 2px; }
        
        input, textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(233,30,99, 0.2);
            border-radius: 8px;
            color: #f0f0f0;
            font-size: 1rem;
            font-family: inherit;
            margin-bottom: 15px;
        }
        input::placeholder, textarea::placeholder { color: #666; }
        textarea { min-height: 100px; resize: vertical; }
        
        .person-section {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .person-label { color: #d4af37; font-size: 1rem; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .person-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .person-row { grid-template-columns: 1fr; } }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #e91e63 0%, #c2185b 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.3s;
        }
        .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(233,30,99, 0.4); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,26,0.98); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .loading-overlay.show { display: flex; }
        .spinner { width: 60px; height: 60px; border: 3px solid rgba(233,30,99, 0.2); border-top-color: #e91e63; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .result-card { display: none; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(233,30,99, 0.3); }
        .result-card.show { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .result-title { font-size: 1.4rem; color: #e91e63; text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(233,30,99, 0.3); }
        .insight-block { background: rgba(233,30,99, 0.05); border-left: 3px solid #e91e63; padding: 15px 20px; margin: 15px 0; border-radius: 0 8px 8px 0; }
        .insight-title { color: #e91e63; font-weight: 600; margin-bottom: 8px; }
        .insight-content { color: #ccc; line-height: 1.8; white-space: pre-wrap; }
        
        .score-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
        .score-item { background: rgba(0,0,0,0.2); padding: 18px; border-radius: 10px; text-align: center; }
        .score-label { color: #888; font-size: 0.85rem; margin-bottom: 8px; }
        .score-value { font-size: 2rem; font-weight: 700; color: #e91e63; }
        .score-note { color: #aaa; font-size: 0.85rem; margin-top: 5px; }
        
        .manual-section { background: linear-gradient(135deg, rgba(233,30,99,0.05) 0%, rgba(212,175,55,0.05) 100%); border: 1px solid rgba(233,30,99,0.2); border-radius: 12px; padding: 20px; margin: 15px 0; }
        .manual-title { color: #d4af37; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .manual-list { list-style: none; padding: 0; }
        .manual-list li { padding: 8px 0 8px 25px; position: relative; color: #ccc; }
        .manual-list li::before { content: '💡'; position: absolute; left: 0; }
        
        .verdict-box { text-align: center; padding: 25px; border-radius: 12px; margin: 25px 0; background: linear-gradient(135deg, rgba(233,30,99,0.1) 0%, rgba(212,175,55,0.1) 100%); border: 1px solid rgba(233,30,99,0.3); }
        .verdict-text { font-size: 1.3rem; color: #e91e63; margin-bottom: 10px; }
        .verdict-keywork { color: #d4af37; }
        
        @media (max-width: 768px) { .score-grid { grid-template-columns: 1fr; } header h1 { font-size: 1.4rem; } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p style="color: #e91e63;">正在分析你们的亲密关系...</p>
        <p style="color: #888; font-size: 0.9rem; margin-top: 10px;">AI正在从你们的描述中读取依恋模式</p>
    </div>

    <div class="container">
        <header>
            <a href="/" class="back-link">← 返回首页</a>
            <img src="/logo.png" alt="心灵锚点" class="logo-small">
            <h1>💞 亲密关系动力学</h1>
            <p class="subtitle">跳出对错之争，剖析核心冲突点，提供相处说明书</p>
        </header>
        
        <div class="intro-box">
            <p class="intro-text">
                AI会从你们的矛盾描述中自动诊断出依恋类型。<br>
                不必贴标签，只需真实描述你们的冲突场景。
            </p>
        </div>
        
        <div class="card" id="inputCard">
            <div class="person-section">
                <div class="person-label">👤 甲方信息</div>
                <div class="person-row">
                    <input type="text" id="aName" placeholder="姓名/昵称 *" value="小明">
                    <input type="text" id="aBirth" placeholder="出生日期（选填，如：1995年3月）">
                </div>
                <input type="text" id="aMbti" placeholder="MBTI（选填，如：INTJ）">
            </div>
            
            <div class="person-section">
                <div class="person-label">👤 乙方信息</div>
                <div class="person-row">
                    <input type="text" id="bName" placeholder="姓名/昵称 *" value="小红">
                    <input type="text" id="bBirth" placeholder="出生日期（选填，如：1997年8月）">
                </div>
                <input type="text" id="bMbti" placeholder="MBTI（选填，如：ENFP）">
            </div>
            
            <div class="card-title">当前关系状态 *</div>
            <textarea id="currentStatus" placeholder="例如：交往3年，最近频繁争吵，感觉越来越不理解对方...">交往2年，经常因为回复消息的速度吵架。我觉得他不够在乎我，他觉得我太粘人。</textarea>
            
            <div class="card-title">最近一次争吵的描述（越详细越好）</div>
            <textarea id="conflictDescription" placeholder="请描述最近一次让你们产生矛盾的场景：&#10;• 当时发生了什么？&#10;• 你们各自说了什么/做了什么？&#10;• 事后各自的感受是什么？&#10;&#10;例如：上周我发消息给他，他过了3小时才回复。我当时就炸了，质问他是不是不在乎我了。他说工作忙，让我别无理取闹。我觉得他冷漠，他觉得我控制欲太强..." style="min-height: 150px;">昨晚我分享了一件开心的事给他，他只回了一个"哦"。我很失落，问他是不是不想听我讲话。他突然发火，说我在小事上找他茬。我觉得他敷衍，他觉得我敏感。吵到最后他沉默不理我了，我反而更焦虑...</textarea>
            
            <button class="submit-btn" onclick="analyzeRelationship()" style="margin-top: 25px;">🔮 生成相处说明书</button>
        </div>
        
        <div class="card result-card" id="resultCard">
            <div class="result-title" id="resultTitle"></div>
            <div id="resultContent"></div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://124.222.70.196:30001';
        
        async function analyzeRelationship() {
            const personA = {
                name: document.getElementById('aName').value.trim(),
                birth_info: document.getElementById('aBirth').value.trim() || null,
                mbti: document.getElementById('aMbti').value.trim() || null
            };
            const personB = {
                name: document.getElementById('bName').value.trim(),
                birth_info: document.getElementById('bBirth').value.trim() || null,
                mbti: document.getElementById('bMbti').value.trim() || null
            };
            const currentStatus = document.getElementById('currentStatus').value.trim();
            const conflictDescription = document.getElementById('conflictDescription').value.trim() || null;
            
            if (!personA.name || !personB.name || !currentStatus) {
                return alert('请填写双方姓名和当前关系状态');
            }
            
            document.getElementById('inputCard').style.display = 'none';
            document.getElementById('loadingOverlay').classList.add('show');
            document.getElementById('resultCard').classList.remove('show');
            
            try {
                const response = await fetch(`${API_BASE}/api/marriage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        person_a_info: personA,
                        person_b_info: personB,
                        current_status: currentStatus,
                        conflict_description: conflictDescription
                    })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || '分析失败');
                displayResult(data.result);
            } catch (error) {
                alert('分析失败：' + error.message);
                document.getElementById('inputCard').style.display = 'block';
            } finally {
                document.getElementById('loadingOverlay').classList.remove('show');
            }
        }
        
        function displayResult(result) {
            document.getElementById('resultTitle').textContent = result.title;
            let html = '';
            
            if (result.narrative) {
                html += `<div class="insight-block"><div class="insight-title">📖 关系洞察</div><div class="insight-content">${result.narrative}</div></div>`;
            }
            
            if (result.compatibility_matrix) {
                html += `<div class="card-title" style="margin-top: 30px;">📊 兼容度评分</div>`;
                html += `<div class="score-grid">`;
                const matrix = result.compatibility_matrix;
                html += `<div class="score-item"><div class="score-label">情感模式</div><div class="score-value">${matrix.emotional.score}/10</div><div class="score-note">${matrix.emotional.note}</div></div>`;
                html += `<div class="score-item"><div class="score-label">沟通方式</div><div class="score-value">${matrix.communication.score}/10</div><div class="score-note">${matrix.communication.note}</div></div>`;
                html += `</div>`;
            }
            
            if (result.attachment_dynamics) {
                html += `<div class="insight-block" style="border-left-color: #9370db;"><div class="insight-title">🧠 AI诊断的依恋动态</div><div class="insight-content">${result.attachment_dynamics}</div></div>`;
            }
            
            if (result.core_conflict) {
                html += `<div class="card-title" style="margin-top: 25px;">⚡ 核心冲突剖析</div>`;
                html += `<div class="insight-block"><div class="insight-title">底层逻辑</div><div class="insight-content">${result.core_conflict.description}</div></div>`;
                html += `<div class="insight-block" style="border-left-color: #3498db;"><div class="insight-title">甲方视角：${result.core_conflict.a_perspective}</div></div>`;
                html += `<div class="insight-block" style="border-left-color: #e74c3c;"><div class="insight-title">乙方视角：${result.core_conflict.b_perspective}</div></div>`;
                html += `<div class="insight-block" style="border-left-color: #2ecc71;"><div class="insight-title">💡 心理学翻译</div><div class="insight-content">${result.core_conflict.translation}</div></div>`;
            }
            
            if (result.operating_manual) {
                html += `<div class="manual-section"><div class="manual-title">📘 给${document.getElementById('aName').value || '甲方'}的高情商建议</div><ul class="manual-list">`;
                result.operating_manual.for_a.forEach(item => html += `<li>${item}</li>`);
                html += `</ul></div>`;
                
                html += `<div class="manual-section"><div class="manual-title">📗 给${document.getElementById('bName').value || '乙方'}的情绪价值建议</div><ul class="manual-list">`;
                result.operating_manual.for_b.forEach(item => html += `<li>${item}</li>`);
                html += `</ul></div>`;
            }
            
            if (result.verdict) {
                html += `<div class="verdict-box"><div class="verdict-text">${result.verdict.assessment}</div><div class="verdict-keywork">关键功课：${result.verdict.key_work}</div></div>`;
            }
            
            document.getElementById('resultContent').innerHTML = html;
            document.getElementById('resultCard').classList.add('show');
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
